# ============================================================
#  Site
# ============================================================
title:        "Data Avicenna"
name:         "Data Avicenna"
description:  "Lecturer at the Department of Economics, Universitas Gadjah Mada (UGM)."
url:          "https://davicenna.github.io"
locale:       "en-US"

# ============================================================
#  Theme — Minimal Mistakes via GitHub Pages remote_theme
#  https://mmistakes.github.io/minimal-mistakes/
# ============================================================
remote_theme:           "mmistakes/minimal-mistakes@4.28.0"
# Available skins: default, air, aqua, contrast, dark, dirt, mint, neon, plum, sunrise
# Try changing this one line to see a completely different colour scheme.
minimal_mistakes_skin:  "air"

# ============================================================
#  Author profile (renders as the left sidebar on every page)
# ============================================================
author:
  name:   "Data Avicenna"
  avatar: "/assets/img/profile.png"
  bio:    "Lecturer, Department of Economics, Universitas Gadjah Mada (UGM)."
  location: "Yogyakarta, Indonesia"
  links:
    - label: "Email"
      icon:  "fas fa-fw fa-envelope"
      url:   "mailto:dataavicenna@ugm.ac.id"
    - label: "LinkedIn"
      icon:  "fab fa-fw fa-linkedin"
      url:   "https://linkedin.com/in/dataavicenna"
    - label: "Google Scholar"
      icon:  "fas fa-fw fa-graduation-cap"
      url:   "https://scholar.google.com/citations?user=CyHRuT0AAAAJ&hl=en&oi=ao"
    - label: "CV (PDF)"
      icon:  "fas fa-fw fa-file-pdf"
      url:   "/assets/CV_Data_Avicenna_2026.pdf"
    - label: "Medium"
      icon:  "fab fa-fw fa-medium"
      url:   "https://dataavicenna.medium.com"
    - label: "GitHub"
      icon:  "fab fa-fw fa-github"
      url:   "https://github.com/davicenna"

# Footer
footer:
  links:
    - label: "Email"
      icon:  "fas fa-fw fa-envelope"
      url:   "mailto:dataavicenna@ugm.ac.id"
    - label: "LinkedIn"
      icon:  "fab fa-fw fa-linkedin"
      url:   "https://linkedin.com/in/dataavicenna"
    - label: "Google Scholar"
      icon:  "fas fa-fw fa-graduation-cap"
      url:   "https://scholar.google.com/citations?user=CyHRuT0AAAAJ&hl=en&oi=ao"
    - label: "GitHub"
      icon:  "fab fa-fw fa-github"
      url:   "https://github.com/davicenna"

# ============================================================
#  Reading / build
# ============================================================
markdown:         kramdown
highlighter:      rouge
breadcrumbs:      false
search:           true
search_full_content: true
words_per_minute: 200

# Reasonable defaults: every page gets the sidebar profile + the
# "single" layout, so you never have to repeat front matter.
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout:         single
      author_profile: true
      classes:        wide
      show_date:      false
      read_time:      false
      comments:       false
      share:          false
      related:        false

# Keep .html URLs (matches your existing links)
permalink: /:basename:output_ext

# ============================================================
#  Plugins (all GitHub-Pages-approved)
# ============================================================
plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude theme dev artefacts from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .sass-cache
  - .jekyll-cache
